<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="login.css">
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div id="popup" class="popup hidden">Invalid credentials. Please try again.</div>
    <div class="container">
        <div class="row col-md-12 wrapper">
            <div class="col-md-6">
                <div class="imagewrap">
                    <div class="image-container">
                        <img src="LOGO.svg" class="Logo" alt="AOS Logo">
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="Loginwrap">
                    <div>
                        <form onsubmit="event.preventDefault(); login();">
                            <h1 class="question">Login</h1>
                            <br>
                            <label for="username">Name</label>
                            <br>
                            <input type="text" id="username" placeholder="Username" required>
                            <br>
                            <label for="password">Password</label>
                            <br>
                            <input type="password" id="password" placeholder="Password" required>
                            <br>
                        </form>
                    </div>
                    <div class="btn-group">
                        <button type="submit" id="lgbtn" onclick="login()" class="login-btn">Login</button>
                    </div>
                        <br>
                        <p>Dosent Have an Account?<a href="sign-up.html">SignUp</a></p>
                        <a href="index.html">HomePage</a>
                </div>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
